<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora</title>

<style>
body { margin:0; font-family:Arial; background:#efe8fb; }

/* TABS */
.tabbar { display:flex; gap:10px; padding:15px; }
.tab-btn {
  padding:10px 14px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:#eee;
}
.tab-btn.active { background:#8d55ff; color:white; }

/* CONTENT */
.tab-content { display:none; padding:20px; }
.tab-content.active { display:block; }

/* LAYOUT */
.layout { display:grid; grid-template-columns: 1fr 300px; gap:20px; }

/* CHAT */
.chat { border:1px solid #ddd; padding:15px; border-radius:20px; background:white; }
.bubble { padding:10px; margin:5px 0; border-radius:10px; }
.ai { background:#eee; }
.user { background:#8d55ff; color:white; text-align:right; }

/* AI BOO PAGE */
.ai-boo { text-align:center; padding-top:60px; }

.model {
  width:80px;
  height:200px;
  background:linear-gradient(#8d55ff,#ff8fab);
  margin:auto;
  animation: walk 6s forwards;
}

@keyframes walk {
  0% { transform:translateX(-200px); }
  100% { transform:translateX(0); }
}

.speech { margin-top:20px; display:none; }

.builder { display:none; margin-top:30px; }

/* SIDEBAR */
.sidebar { background:white; padding:15px; border-radius:20px; }

</style>
</head>

<body>

<!-- TABS -->
<div class="tabbar">
  <button class="tab-btn active" onclick="openTab('velora')">Velora</button>
  <button class="tab-btn" onclick="openTab('meet')">Meet</button>
  <button class="tab-btn" onclick="openTab('discover')">Discover</button>
  <button class="tab-btn" onclick="openTab('contests')">Contests</button>
  <button class="tab-btn" onclick="openTab('profile')">Profile</button>
</div>

<!-- VELORA -->
<div id="velora" class="tab-content active">
  <div class="layout">
    
    <div class="chat">
      <h2>Velora AI</h2>
      <div id="chatBox"></div>
      <input id="input" placeholder="type..." />
      <button onclick="send()">Send</button>
      <br><br>
      <button onclick="openTab('ai')">Open AI Boo Page</button>
    </div>

    <div class="sidebar">
      <h3>Settings</h3>
      <input id="name" placeholder="AI Name" value="Velora">
      <select id="personality">
        <option>Balanced</option>
        <option>Flirty</option>
        <option>Savage</option>
      </select>
    </div>

  </div>
</div>

<!-- AI BOO PAGE -->
<div id="ai" class="tab-content">
  <div class="ai-boo">

    <div class="model" id="model"></div>

    <div class="speech" id="speech">
      <h2>Hi, I’m Velora 💋</h2>
      <p>Program me just right.</p>
    </div>

    <div class="builder" id="builder">
      <h3>Setup Velora</h3>

      <input placeholder="AI Name">

      <select>
        <option>English</option>
        <option>Spanish</option>
      </select>

      <select>
        <option>Flirty</option>
        <option>Sweet</option>
        <option>Savage</option>
      </select>

      <select>
        <option>Soft Voice</option>
        <option>Luxury Voice</option>
        <option>Boss Voice</option>
      </select>

    </div>

  </div>
</div>

<!-- OTHER TABS -->
<div id="meet" class="tab-content">Meet page</div>
<div id="discover" class="tab-content">Swipe page</div>
<div id="contests" class="tab-content">Contest page</div>
<div id="profile" class="tab-content">Profile page</div>

<script>

/* TAB SYSTEM */
function openTab(id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
}

/* CHAT */
function send(){
  let input = document.getElementById("input").value;
  let box = document.getElementById("chatBox");

  box.innerHTML += `<div class="bubble user">${input}</div>`;
  box.innerHTML += `<div class="bubble ai">Velora: Hey boo 💋</div>`;
}

/* AI BOO ANIMATION */
setTimeout(()=>{
  document.getElementById("speech").style.display="block";
},4000);

setTimeout(()=>{
  document.getElementById("builder").style.display="block";
},7000);

</script>

</body>
</html>
